<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Engineer Roadmap</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f5f4;--bg-tertiary:#f0efed;
  --text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#9b9b9b;
  --border-light:rgba(0,0,0,0.1);--border-medium:rgba(0,0,0,0.2);
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;
  --radius-md:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1c1c1e;--bg-secondary:#2c2c2e;--bg-tertiary:#3a3a3c;
    --text-primary:#f2f2f7;--text-secondary:#aeaeb2;--text-tertiary:#636366;
    --border-light:rgba(255,255,255,0.1);--border-medium:rgba(255,255,255,0.2);
    --green-light:#0a2e1f;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh;padding:1rem}
.wrap{max-width:780px;margin:0 auto;padding-bottom:4rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:20px;font-weight:600;color:var(--text-primary)}
.export-btn{padding:7px 14px;border-radius:var(--radius-md);border:1px solid var(--border-medium);font-size:13px;cursor:pointer;background:var(--bg-primary);color:var(--text-primary);display:flex;align-items:center;gap:6px;transition:background 0.15s}
.export-btn:hover{background:var(--bg-secondary)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:8px;margin-bottom:1.25rem}
.sc{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 12px;text-align:center;border:1px solid var(--border-light)}
.sc-num{font-size:20px;font-weight:600;color:var(--text-primary)}
.sc-lbl{font-size:11px;color:var(--text-secondary);margin-top:2px}
.global-bar-wrap{margin-bottom:1.5rem}
.bar-track{background:var(--bg-secondary);border-radius:20px;height:8px;overflow:hidden;border:1px solid var(--border-light)}
.bar-fill{height:100%;background:var(--green);border-radius:20px;transition:width 0.4s}
.bar-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-top:5px}
.streak-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.streak-box{background:var(--bg-secondary);border-radius:var(--radius-md);padding:8px 14px;font-size:13px;color:var(--text-primary);display:flex;align-items:center;gap:6px;border:1px solid var(--border-light)}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{padding:6px 13px;border-radius:20px;border:1px solid var(--border-light);font-size:12px;cursor:pointer;background:var(--bg-primary);color:var(--text-secondary);white-space:nowrap;transition:all 0.15s}
.tab.on{background:var(--green);color:#fff;border-color:var(--green);font-weight:500}
.tab .cnt{font-size:11px;margin-left:5px;opacity:0.8}
.sec{display:none}.sec.on{display:block}
.course-banner{background:var(--bg-secondary);border-radius:var(--radius-lg);padding:11px 14px;margin-bottom:8px;border:1px solid var(--border-light)}
.cb-title{font-size:13px;font-weight:600;color:var(--text-primary)}
.cb-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.cb-link{font-size:12px;color:var(--green);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:4px}
.cb-link:hover{text-decoration:underline}
.cert-pill{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;background:var(--green-light);color:var(--green-dark);margin-left:6px;font-weight:500}
.stack-pill{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:500}
.pill-node{background:#EAF3DE;color:#3B6D11}
.pill-spring{background:#E1F5EE;color:#085041}
.pill-django{background:#E6F1FB;color:#0C447C}
.pill-flask{background:#FAEEDA;color:#633806}
@media(prefers-color-scheme:dark){
  .pill-node{background:#1a3010;color:#7ec87e}
  .pill-spring{background:#0a2e1f;color:#5dcaa5}
  .pill-django{background:#0a1e3f;color:#85b7eb}
  .pill-flask{background:#2e1a00;color:#ef9f27}
}
.sec-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.sec-bar-track{flex:1;background:var(--bg-secondary);border-radius:10px;height:6px;overflow:hidden;border:1px solid var(--border-light)}
.sec-bar-fill{height:100%;background:var(--green);border-radius:10px;transition:width 0.4s}
.sec-pct{font-size:12px;color:var(--text-secondary);min-width:36px;text-align:right}
.group-hd{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin:1rem 0 5px;padding-left:2px;display:flex;align-items:center;gap:6px}
.items{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--bg-primary);border:1px solid var(--border-light);border-radius:var(--radius-md);cursor:pointer;transition:border-color 0.15s;user-select:none}
.item:hover{border-color:var(--border-medium)}
.item.done{opacity:0.55}
.item.done .item-txt{text-decoration:line-through;color:var(--text-tertiary)}
.cb2{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border-medium);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.15s}
.item.done .cb2{background:var(--green);border-color:var(--green)}
.ck{display:none;font-size:11px;font-weight:700;color:#fff;line-height:1}
.item.done .ck{display:block}
.item-txt{font-size:13px;color:var(--text-primary);line-height:1.4;flex:1}
.item-num{font-size:11px;color:var(--text-tertiary);flex-shrink:0;align-self:center;white-space:nowrap}
.divider{height:1px;background:var(--border-light);margin:12px 0}
.analytics-wrap{margin-top:2rem;background:var(--bg-primary);border-radius:var(--radius-lg);padding:1.25rem;border:1px solid var(--border-light)}
.chart-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px}
.chart-sub{font-size:12px;color:var(--text-secondary);margin-bottom:10px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text-secondary)}
.leg-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:1px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>Complete Engineer Roadmap</h1>
    <button class="export-btn" onclick="exportData()">&#8595; Export progress</button>
  </div>
  <div class="stats-row" id="statsRow"></div>
  <div class="global-bar-wrap">
    <div class="bar-track"><div class="bar-fill" id="globalFill" style="width:0%"></div></div>
    <div class="bar-meta"><span id="globalTxt">0 / 0 done</span><span id="globalPct">0%</span></div>
  </div>
  <div class="streak-row" id="streakRow"></div>
  <div class="tabs" id="tabsEl"></div>
  <div id="sectionsEl"></div>
  <div class="analytics-wrap">
    <div class="chart-title">Daily progress &mdash; last 14 days</div>
    <div class="chart-sub">Steps completed per day across all tracks</div>
    <div class="legend">
      <span><span class="leg-dot" style="background:#1D9E75"></span>Completed</span>
      <span><span class="leg-dot" style="background:#378ADD"></span>Cumulative</span>
    </div>
    <div style="position:relative;width:100%;height:200px"><canvas id="dailyChart"></canvas></div>
    <div class="chart-title" style="margin-top:1.5rem">Track completion</div>
    <div class="legend" id="trackLegend"></div>
    <div style="position:relative;height:240px"><canvas id="trackChart"></canvas></div>
  </div>
</div>

const PILL_MAP={node:{cls:'pill-node',label:'Node.js'},spring:{cls:'pill-spring',label:'Spring Boot'},django:{cls:'pill-django',label:'Django'},flask:{cls:'pill-flask',label:'Flask'}};
const TOTAL=TRACKS.reduce((a,t)=>a+t.groups.reduce((b,g)=>b+g.items.length,0),0);
let state={},dailyLog={};
try{state=JSON.parse(localStorage.getItem('cer6_s')||'{}')}catch(e){}
try{dailyLog=JSON.parse(localStorage.getItem('cer6_d')||'{}')}catch(e){}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function save(){try{localStorage.setItem('cer6_s',JSON.stringify(state));localStorage.setItem('cer6_d',JSON.stringify(dailyLog))}catch(e){}}
function ikey(tid,gi,ii){return tid+'|'+gi+'|'+ii}
function trackProgress(tid){let tot=0,done=0;TRACKS.find(t=>t.id===tid).groups.forEach((g,gi)=>g.items.forEach((_,ii)=>{tot++;if(state[ikey(tid,gi,ii)])done++}));return{tot,done}}
function totalDone(){let d=0;TRACKS.forEach(t=>t.groups.forEach((g,gi)=>g.items.forEach((_,ii)=>{if(state[ikey(t.id,gi,ii)])d++})));return d}
function calcStreak(){let s=0,d=new Date();for(;;){const k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();if((dailyLog[k]||0)>0){s++;d.setDate(d.getDate()-1)}else break}return s}
function toggle(tid,gi,ii){
  const k=ikey(tid,gi,ii),was=!!state[k];
  state[k]=!was;
  const dk=todayKey();
  dailyLog[dk]=Math.max(0,(dailyLog[dk]||0)+(was?-1:1));
  save();document.getElementById('i_'+k)&&document.getElementById('i_'+k).classList.toggle('done',state[k]);updateAll();
}
let dc=null,tc=null;
function updateAll(){
  const done=totalDone(),pct=TOTAL>0?Math.round(done/TOTAL*100):0;
  document.getElementById('globalFill').style.width=pct+'%';
  document.getElementById('globalTxt').textContent=done+' / '+TOTAL+' done';
  document.getElementById('globalPct').textContent=pct+'%';
  const sr=document.getElementById('statsRow');sr.innerHTML='';
  TRACKS.forEach((t,i)=>{
    const{tot,done:d}=trackProgress(t.id),p=tot>0?Math.round(d/tot*100):0;
    sr.innerHTML+=`<div class="sc"><div class="sc-num">${p}%</div><div class="sc-lbl">${t.name}</div></div>`;
    const tabCnt=document.querySelectorAll('.tab')[i]&&document.querySelectorAll('.tab')[i].querySelector('.cnt');
    if(tabCnt)tabCnt.textContent=d;
    const sf=document.getElementById('sbf_'+t.id),sp=document.getElementById('sbp_'+t.id);
    if(sf)sf.style.width=p+'%';if(sp)sp.textContent=p+'%';
  });
  document.getElementById('streakRow').innerHTML=
    `<div class="streak-box">&#128293; ${calcStreak()} day streak</div>`+
    `<div class="streak-box">&#128197; ${dailyLog[todayKey()]||0} done today</div>`+
    `<div class="streak-box">&#10003; ${totalDone()} total done</div>`;
  updateCharts();
}
function updateCharts(){
  const days=[],counts=[],cum=[];let c=0;
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(),v=dailyLog[k]||0;days.push((d.getMonth()+1)+'/'+(d.getDate()));counts.push(v);c+=v;cum.push(c);}
  if(dc){dc.data.labels=days;dc.data.datasets[0].data=counts;dc.data.datasets[1].data=cum;dc.update()}
  else{dc=new Chart(document.getElementById('dailyChart'),{type:'bar',data:{labels:days,datasets:[{label:'Completed',data:counts,backgroundColor:'#1D9E75',order:2},{label:'Cumulative',data:cum,type:'line',borderColor:'#378ADD',backgroundColor:'transparent',pointRadius:3,order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}}}}}})}
  const cols=['#1D9E75','#7F77DD','#D85A30','#EF9F27','#378ADD'];
  const tData=TRACKS.map(t=>{const{tot,done}=trackProgress(t.id);return tot>0?Math.round(done/tot*100):0});
  document.getElementById('trackLegend').innerHTML=TRACKS.map((t,i)=>`<span><span class="leg-dot" style="background:${cols[i]}"></span>${t.name} ${tData[i]}%</span>`).join('');
  if(tc){tc.data.datasets[0].data=tData;tc.update()}
  else{tc=new Chart(document.getElementById('trackChart'),{type:'bar',data:{labels:TRACKS.map(t=>t.name),datasets:[{label:'%',data:tData,backgroundColor:cols,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}}},y:{ticks:{font:{size:12}}}}}})}
}
function buildUI(){
  const te=document.getElementById('tabsEl'),se=document.getElementById('sectionsEl');
  te.innerHTML='';se.innerHTML='';
  TRACKS.forEach((t,ti)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(ti===0?' on':'');
    tab.innerHTML=t.name+`<span class="cnt">0</span>`;
    tab.onclick=(()=>{const idx=ti;return()=>{document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',i===idx));document.querySelectorAll('.sec').forEach((el,i)=>el.classList.toggle('on',i===idx));}})();
    te.appendChild(tab);
    const sec=document.createElement('div');sec.className='sec'+(ti===0?' on':'');
    let html='';
    t.courses.forEach((c,ci)=>{
      if(ci>0)html+=`<div class="divider"></div>`;
      const pm=c.pill&&PILL_MAP[c.pill]?`<span class="stack-pill ${PILL_MAP[c.pill].cls}">${PILL_MAP[c.pill].label}</span>`:'';
      html+=`<div class="course-banner"><div class="cb-title">${c.title}${pm}${c.cert?'<span class="cert-pill">Free certificate</span>':''}</div><div class="cb-sub">${c.desc}</div><a class="cb-link" href="${c.url}" target="_blank">&#8599; Open course</a></div>`;
    });
    html+=`<div class="sec-bar-row"><div class="sec-bar-track"><div class="sec-bar-fill" id="sbf_${t.id}" style="width:0%"></div></div><span class="sec-pct" id="sbp_${t.id}">0%</span></div>`;
    t.groups.forEach((g,gi)=>{
      const pm=g.pill&&PILL_MAP[g.pill]?`<span class="stack-pill ${PILL_MAP[g.pill].cls}" style="font-size:10px;padding:1px 6px">${PILL_MAP[g.pill].label}</span>`:'';
      html+=`<div class="group-hd">${g.g}${pm}</div><div class="items">`;
      g.items.forEach((item,ii)=>{
        const k=ikey(t.id,gi,ii),done=state[k]?'done':'';
        html+=`<div class="item ${done}" id="i_${k}" onclick="toggle('${t.id}',${gi},${ii})"><div class="cb2"><span class="ck">&#10003;</span></div><span class="item-txt">${item}</span><span class="item-num">${gi+1}.${ii+1}</span></div>`;
      });
      html+='</div>';
    });
    sec.innerHTML=html;se.appendChild(sec);
  });
}
function exportData(){
  const lines=['COMPLETE ENGINEER ROADMAP — PROGRESS EXPORT','Exported: '+new Date().toLocaleDateString(),'Total: '+totalDone()+' / '+TOTAL+' ('+Math.round(totalDone()/TOTAL*100)+'%)',''];
  TRACKS.forEach(t=>{const{tot,done}=trackProgress(t.id);lines.push('=== '+t.name.toUpperCase()+' — '+done+'/'+tot+' ===');t.groups.forEach((g,gi)=>{lines.push('  '+g.g);g.items.forEach((item,ii)=>{lines.push('  '+(state[ikey(t.id,gi,ii)]?'[x]':'[ ]')+' '+item);});});lines.push('');});
  lines.push('--- DAILY LOG ---');Object.keys(dailyLog).sort().forEach(d=>lines.push(d+': '+dailyLog[d]+' tasks'));
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));a.download='engineer_roadmap_progress.txt';a.click();
}
buildUI();updateAll();
</script>
